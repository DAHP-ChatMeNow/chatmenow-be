name: CI/CD Pipeline

on:
  push:
    branches:
      - main
      - prod

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: dahp-chatmenow/chatmenow-be

jobs:
  # ─── CI ─────────────────────────────
  ci:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci
      - run: npm run lint --if-present
      - run: npm test --if-present
      - run: npm run build --if-present

  # ─── BUILD IMAGE ────────────────────
  docker:
    runs-on: ubuntu-latest
    needs: ci

    permissions:
      contents: read
      packages: write

    outputs:
      image: ${{ steps.vars.outputs.image }}

    steps:
      - uses: actions/checkout@v4

      - name: Set tag
        id: vars
        run: |
          if [[ "${GITHUB_REF}" == "refs/heads/main" ]]; then
            echo "tag=dev-latest" >> $GITHUB_OUTPUT
          else
            echo "tag=prod-latest" >> $GITHUB_OUTPUT
          fi
          echo "image=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${tag}" >> $GITHUB_OUTPUT

      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=${{ steps.vars.outputs.tag }}

      - uses: docker/setup-buildx-action@v3

      - id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}

  # ─── DEPLOY DEV ─────────────────────
  deploy_dev:
    runs-on: ubuntu-latest
    needs: docker
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Deploy DEV
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}

          script: |
            IMAGE="ghcr.io/dahp-chatmenow/chatmenow-be:dev-latest"
            CONTAINER="chatmenow-dev"
            ENV_FILE="$HOME/chatmenow-dev/.env"

            echo "${{ secrets.GHCR_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

            docker pull $IMAGE

            docker rm -f $CONTAINER || true

            PORT=$(grep '^PORT=' $ENV_FILE | cut -d '=' -f2)

            docker run -d \
              --name $CONTAINER \
              --env-file $ENV_FILE \
              --restart unless-stopped \
              -p $PORT:$PORT \
              $IMAGE

  # ─── DEPLOY PROD ────────────────────
  deploy_prod:
    runs-on: ubuntu-latest
    needs: docker
    if: github.ref == 'refs/heads/prod'

    steps:
      - name: Deploy PROD
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}

          script: |
            IMAGE="ghcr.io/dahp-chatmenow/chatmenow-be:prod-latest"
            CONTAINER="chatmenow-prod"
            ENV_FILE="$HOME/chatmenow-prod/.env"

            echo "${{ secrets.GHCR_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

            docker pull $IMAGE

            docker rm -f $CONTAINER || true

            PORT=$(grep '^PORT=' $ENV_FILE | cut -d '=' -f2)

            docker run -d \
              --name $CONTAINER \
              --env-file $ENV_FILE \
              --restart unless-stopped \
              -p $PORT:$PORT \
              $IMAGE
