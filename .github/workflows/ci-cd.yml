name: CI/CD Pipeline

on:
  push:
    branches:
      - main
      - prod

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: dahp-chatmenow/chatmenow-be

jobs:
  # ─── CI ─────────────────────────────
  ci:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci
      - run: npm run lint --if-present
      - run: npm test --if-present
      - run: npm run build --if-present

  # ─── BUILD IMAGE ────────────────────
  docker:
    runs-on: ubuntu-latest
    needs: ci

    permissions:
      contents: read
      packages: write

    outputs:
      image: ${{ steps.vars.outputs.image }}

    steps:
      - uses: actions/checkout@v4

      - name: Set tag
        id: vars
        run: |
          TAG=""
          if [[ "${GITHUB_REF}" == "refs/heads/main" ]]; then
            TAG="dev-latest"
          else
            TAG="prod-latest"
          fi
          echo "tag=${TAG}" >> $GITHUB_OUTPUT
          echo "image=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${TAG}" >> $GITHUB_OUTPUT

      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=${{ steps.vars.outputs.tag }}

      - uses: docker/setup-buildx-action@v3

      - id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}

  # ─── DEPLOY DEV ─────────────────────
  deploy_dev:
    runs-on: ubuntu-latest
    needs: docker
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Deploy DEV
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SSH_HOST }}
          port: ${{ secrets.SSH_PORT }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}

          script: |
            set -euo pipefail

            IMAGE="ghcr.io/dahp-chatmenow/chatmenow-be:dev-latest"
            CONTAINER="chatmenow-dev"
            ENV_FILE="$HOME/chatmenow-dev/.env"
            REQUIRED_VARS=("PORT" "LIVEKIT_URL" "LIVEKIT_API_KEY" "LIVEKIT_API_SECRET")

            if [[ ! -f "$ENV_FILE" ]]; then
              echo "Missing env file: $ENV_FILE"
              exit 1
            fi

            for KEY in "${REQUIRED_VARS[@]}"; do
              VALUE="$(grep -E "^${KEY}=" "$ENV_FILE" | tail -n 1 | cut -d '=' -f2-)"
              if [[ -z "$VALUE" ]]; then
                echo "Missing required variable in $ENV_FILE: $KEY"
                exit 1
              fi
            done

            LIVEKIT_URL_VALUE="$(grep -E '^LIVEKIT_URL=' "$ENV_FILE" | tail -n 1 | cut -d '=' -f2-)"
            if [[ "$LIVEKIT_URL_VALUE" == "ws://localhost:7880" ]]; then
              echo "Warning: LIVEKIT_URL is set to ws://localhost:7880 (usually invalid for remote clients)."
            fi

            get_env_var() {
              local key="$1"
              grep -E "^${key}=" "$ENV_FILE" | tail -n 1 | cut -d '=' -f2-
            }

            PORT="$(get_env_var PORT)"
            LIVEKIT_API_KEY_VALUE="$(get_env_var LIVEKIT_API_KEY)"
            LIVEKIT_API_SECRET_VALUE="$(get_env_var LIVEKIT_API_SECRET)"

            LIVEKIT_CONTAINER="$(get_env_var LIVEKIT_CONTAINER_NAME)"
            LIVEKIT_CONTAINER="${LIVEKIT_CONTAINER:-chatmenow-livekit-dev}"

            LIVEKIT_IMAGE="$(get_env_var LIVEKIT_IMAGE)"
            LIVEKIT_IMAGE="${LIVEKIT_IMAGE:-livekit/livekit-server:v1.8.4}"

            LIVEKIT_CONFIG_PATH="$(get_env_var LIVEKIT_CONFIG_PATH)"
            LIVEKIT_CONFIG_PATH="${LIVEKIT_CONFIG_PATH:-$HOME/chatmenow-dev/livekit.yaml}"

            LIVEKIT_WS_PORT="$(get_env_var LIVEKIT_WS_PORT)"
            LIVEKIT_WS_PORT="${LIVEKIT_WS_PORT:-7880}"

            LIVEKIT_TCP_PORT="$(get_env_var LIVEKIT_TCP_PORT)"
            LIVEKIT_TCP_PORT="${LIVEKIT_TCP_PORT:-7881}"

            LIVEKIT_UDP_PORT_RANGE="$(get_env_var LIVEKIT_UDP_PORT_RANGE)"
            LIVEKIT_UDP_PORT_RANGE="${LIVEKIT_UDP_PORT_RANGE:-50000-50100}"

            echo "${{ secrets.GHCR_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

            if [[ ! -f "$LIVEKIT_CONFIG_PATH" ]]; then
              echo "Missing LiveKit config file: $LIVEKIT_CONFIG_PATH"
              exit 1
            fi

            docker pull "$LIVEKIT_IMAGE"
            docker pull $IMAGE

            docker rm -f "$LIVEKIT_CONTAINER" || true
            docker run -d \
              --name "$LIVEKIT_CONTAINER" \
              --restart unless-stopped \
              -e LIVEKIT_KEYS="${LIVEKIT_API_KEY_VALUE}: ${LIVEKIT_API_SECRET_VALUE}" \
              -v "$LIVEKIT_CONFIG_PATH:/etc/livekit.yaml:ro" \
              -p "${LIVEKIT_WS_PORT}:7880/tcp" \
              -p "${LIVEKIT_TCP_PORT}:7881/tcp" \
              -p "${LIVEKIT_UDP_PORT_RANGE}:${LIVEKIT_UDP_PORT_RANGE}/udp" \
              "$LIVEKIT_IMAGE" --config /etc/livekit.yaml

            docker rm -f $CONTAINER || true

            docker run -d \
              --name $CONTAINER \
              --env-file $ENV_FILE \
              --restart unless-stopped \
              -p $PORT:$PORT \
              $IMAGE

  # ─── DEPLOY PROD ────────────────────
  deploy_prod:
    runs-on: ubuntu-latest
    needs: docker
    if: github.ref == 'refs/heads/prod'

    steps:
      - name: Deploy PROD
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SSH_HOST }}
          port: ${{ secrets.SSH_PORT }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}

          script: |
            set -euo pipefail

            IMAGE="ghcr.io/dahp-chatmenow/chatmenow-be:prod-latest"
            CONTAINER="chatmenow-prod"
            ENV_FILE="$HOME/chatmenow-prod/.env"
            REQUIRED_VARS=("PORT" "LIVEKIT_URL" "LIVEKIT_API_KEY" "LIVEKIT_API_SECRET")

            if [[ ! -f "$ENV_FILE" ]]; then
              echo "Missing env file: $ENV_FILE"
              exit 1
            fi

            for KEY in "${REQUIRED_VARS[@]}"; do
              VALUE="$(grep -E "^${KEY}=" "$ENV_FILE" | tail -n 1 | cut -d '=' -f2-)"
              if [[ -z "$VALUE" ]]; then
                echo "Missing required variable in $ENV_FILE: $KEY"
                exit 1
              fi
            done

            LIVEKIT_URL_VALUE="$(grep -E '^LIVEKIT_URL=' "$ENV_FILE" | tail -n 1 | cut -d '=' -f2-)"
            if [[ "$LIVEKIT_URL_VALUE" == "ws://localhost:7880" ]]; then
              echo "Warning: LIVEKIT_URL is set to ws://localhost:7880 (usually invalid for remote clients)."
            fi

            get_env_var() {
              local key="$1"
              grep -E "^${key}=" "$ENV_FILE" | tail -n 1 | cut -d '=' -f2-
            }

            PORT="$(get_env_var PORT)"
            LIVEKIT_API_KEY_VALUE="$(get_env_var LIVEKIT_API_KEY)"
            LIVEKIT_API_SECRET_VALUE="$(get_env_var LIVEKIT_API_SECRET)"

            LIVEKIT_CONTAINER="$(get_env_var LIVEKIT_CONTAINER_NAME)"
            LIVEKIT_CONTAINER="${LIVEKIT_CONTAINER:-chatmenow-livekit-prod}"

            LIVEKIT_IMAGE="$(get_env_var LIVEKIT_IMAGE)"
            LIVEKIT_IMAGE="${LIVEKIT_IMAGE:-livekit/livekit-server:v1.8.4}"

            LIVEKIT_CONFIG_PATH="$(get_env_var LIVEKIT_CONFIG_PATH)"
            LIVEKIT_CONFIG_PATH="${LIVEKIT_CONFIG_PATH:-$HOME/chatmenow-prod/livekit.yaml}"

            LIVEKIT_WS_PORT="$(get_env_var LIVEKIT_WS_PORT)"
            LIVEKIT_WS_PORT="${LIVEKIT_WS_PORT:-7980}"

            LIVEKIT_TCP_PORT="$(get_env_var LIVEKIT_TCP_PORT)"
            LIVEKIT_TCP_PORT="${LIVEKIT_TCP_PORT:-7981}"

            LIVEKIT_UDP_PORT_RANGE="$(get_env_var LIVEKIT_UDP_PORT_RANGE)"
            LIVEKIT_UDP_PORT_RANGE="${LIVEKIT_UDP_PORT_RANGE:-51000-51100}"

            echo "${{ secrets.GHCR_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

            if [[ ! -f "$LIVEKIT_CONFIG_PATH" ]]; then
              echo "Missing LiveKit config file: $LIVEKIT_CONFIG_PATH"
              exit 1
            fi

            docker pull "$LIVEKIT_IMAGE"
            docker pull $IMAGE

            docker rm -f "$LIVEKIT_CONTAINER" || true
            docker run -d \
              --name "$LIVEKIT_CONTAINER" \
              --restart unless-stopped \
              -e LIVEKIT_KEYS="${LIVEKIT_API_KEY_VALUE}: ${LIVEKIT_API_SECRET_VALUE}" \
              -v "$LIVEKIT_CONFIG_PATH:/etc/livekit.yaml:ro" \
              -p "${LIVEKIT_WS_PORT}:7880/tcp" \
              -p "${LIVEKIT_TCP_PORT}:7881/tcp" \
              -p "${LIVEKIT_UDP_PORT_RANGE}:${LIVEKIT_UDP_PORT_RANGE}/udp" \
              "$LIVEKIT_IMAGE" --config /etc/livekit.yaml

            docker rm -f $CONTAINER || true

            docker run -d \
              --name $CONTAINER \
              --env-file $ENV_FILE \
              --restart unless-stopped \
              -p $PORT:$PORT \
              $IMAGE
